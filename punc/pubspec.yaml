name: punc
description: "Plataforma urbana da notificação de coleta"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.5.0
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  firebase_core:
  firebase_messaging:
  geolocator: ^14.0.3
  shared_preferences: ^2.5.5
  device_info_plus: ^13.1.0
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  rename_app: ^1.6.6

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/imagens/icones/logo.png"

config_name:
  name: "PUNC"

flutter:
  uses-material-design: true
  assets:
    - assets/imagens/icones/logo.png
